name: CI

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Run full clippy, workspace tests, and smoke checks"
        required: false
        default: true
        type: boolean
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build and smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2
      - name: Decide CI depth
        id: ci-depth
        shell: bash
        run: |
          full=false
          case "${{ github.event_name }}" in
            pull_request)
              full=false
              ;;
            workflow_dispatch)
              full="${{ inputs.full }}"
              ;;
            *)
              full=true
              ;;
          esac
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}" = "true" ]; then
            full=true
          fi
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "CI depth: $([ "$full" = "true" ] && echo full || echo quick)"
      - name: Detect changed areas
        id: changes
        shell: bash
        run: |
          rust=true
          if [ "${{ steps.ci-depth.outputs.full }}" != "true" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            rust=false
            changed="$RUNNER_TEMP/changed-files.txt"
            if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
              git diff --name-only HEAD^1 HEAD > "$changed"
            else
              git diff-tree --no-commit-id --name-only -r HEAD > "$changed"
            fi

            if grep -Eq '^(Cargo\.toml|Cargo\.lock|crates/|mlx-sidecar/|third-party/yt-dlp-manifest\.json|scripts/.*(check-ytdlp-release|fetch-binaries|build-installers|smoke)|\.github/workflows/ci\.yml)' "$changed"; then
              rust=true
            fi

            echo "Changed files:"
            sed 's/^/  /' "$changed"
          fi

          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "Rust gate: $rust"
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Check release metadata
        run: node scripts/sync-release-metadata.mjs --check
      - name: Check CSS tokens and type floor
        run: node scripts/check-css-tokens.mjs
      - name: Validate bundled yt-dlp pin
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-ytdlp-release.mjs --check-pinned
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.rust == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.rust == 'true'
        with:
          cache-on-failure: true
      - name: Install native build dependencies
        if: steps.changes.outputs.rust == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            ffmpeg \
            libssl-dev \
            pkg-config \
            protobuf-compiler \
            ripgrep
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Check desktop i18n catalog
        run: pnpm --filter @cerul/desktop check:i18n
      - name: Run desktop unit tests
        run: pnpm --filter @cerul/desktop test
      - name: Fetch Linux runtime binaries
        if: steps.ci-depth.outputs.full == 'true'
        run: scripts/fetch-binaries.sh --target x86_64-unknown-linux-gnu
      - name: Build desktop renderer
        run: pnpm --filter @cerul/desktop build
      - name: Typecheck Electron shell
        run: pnpm --filter @cerul/electron-shell typecheck
      - name: Rust format check
        if: steps.changes.outputs.rust == 'true'
        run: cargo fmt --all -- --check
      - name: Rust quick check
        if: steps.ci-depth.outputs.full != 'true' && steps.changes.outputs.rust == 'true'
        run: cargo check --workspace --all-targets --locked
      - name: Rust clippy
        if: steps.ci-depth.outputs.full == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        if: steps.ci-depth.outputs.full == 'true'
        # NOTE: two cerul-api reindex tests share an on-disk fixture path and fail
        # only inside the full suite (test-isolation bug, tracked separately).
        # Remove these --skip flags once fixtures use per-test temp dirs.
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace -- --skip item_delete_and_reindex_update_storage --skip concurrent_reindex_requests_queue_without_sqlite_locking
      - name: Run lightweight smoke checks
        if: steps.ci-depth.outputs.full == 'true'
        shell: bash
        run: |
          scripts/smoke-brand-assets-ui.sh
          scripts/smoke-theme-ui.sh
          scripts/smoke-hotkey-overlay.sh
          scripts/smoke-jobs-ui.sh
          scripts/smoke-library-ui.sh
          scripts/smoke-release.sh --dry-run --skip-installers

  macos-update-prebuild:
    name: Prebuild macOS update bundle
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ci-macos-prebuild-${{ runner.os }}-${{ runner.arch }}
          shared-key: cerul-api
          cache-targets: true
          cache-on-failure: true
      - name: Install native build dependencies
        shell: bash
        run: brew install protobuf ffmpeg cmake uv
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache signed MLX runtime
        uses: actions/cache@v6
        with:
          path: apps/electron-shell/mlx-runtime
          key: mlx-runtime-signed-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mlx-sidecar/runtime-lock.txt', 'scripts/build-mlx-runtime.sh', 'apps/electron-shell/scripts/sign-mlx-runtime.cjs', 'apps/electron-shell/entitlements/entitlements.mlx-runtime.plist') }}
      - name: Import Developer ID certificate
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            echo "CSC_LINK is required for the signed macOS update prebuild cache." >&2
            exit 2
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - name: Build signed macOS update assets
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
        run: scripts/build-installers.sh --mac-targets zip --require-signing
      - name: Archive app bundle for release tag reuse
        shell: bash
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          tar -C "$(dirname "$app_path")" -czf target/electron/Cerul.app.tar.gz Cerul.app
      - name: Smoke macOS update artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh --macos-update-only
      - name: Smoke macOS update app signing
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          args=(--app "$app_path")
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            args+=(--expected-team-id "$APPLE_TEAM_ID")
          fi
          scripts/smoke-macos-signing.sh "${args[@]}"
      - name: Save same-SHA macOS update prebuild
        uses: actions/cache/save@v6
        continue-on-error: true
        with:
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz.sha256
            apps/electron-shell/mlx-runtime-manifest.json
          key: cerul-macos-update-${{ github.sha }}
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-update-prebuild-${{ github.sha }}
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz.sha256
            apps/electron-shell/mlx-runtime-manifest.json
          if-no-files-found: error
