name: CI

on:
  workflow_dispatch:
    inputs:
      full:
        description: "Run full clippy, workspace tests, and smoke checks"
        required: false
        default: true
        type: boolean
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 20 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Build and smoke
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Decide CI depth
        id: ci-depth
        shell: bash
        run: |
          full=false
          case "${{ github.event_name }}" in
            pull_request)
              full=false
              ;;
            workflow_dispatch)
              full="${{ inputs.full }}"
              ;;
            *)
              full=true
              ;;
          esac
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ contains(github.event.pull_request.labels.*.name, 'full-ci') }}" = "true" ]; then
            full=true
          fi
          echo "full=$full" >> "$GITHUB_OUTPUT"
          echo "CI depth: $([ "$full" = "true" ] && echo full || echo quick)"
      - name: Detect changed areas
        id: changes
        shell: bash
        run: |
          rust=true
          if [ "${{ steps.ci-depth.outputs.full }}" != "true" ] && [ "${{ github.event_name }}" = "pull_request" ]; then
            rust=false
            changed="$RUNNER_TEMP/changed-files.txt"
            if git rev-parse --verify HEAD^1 >/dev/null 2>&1; then
              git diff --name-only HEAD^1 HEAD > "$changed"
            else
              git diff-tree --no-commit-id --name-only -r HEAD > "$changed"
            fi

            if grep -Eq '^(Cargo\.toml|Cargo\.lock|crates/|mlx-sidecar/|scripts/.*(fetch-binaries|build-installers|smoke)|\.github/workflows/ci\.yml)' "$changed"; then
              rust=true
            fi

            echo "Changed files:"
            sed 's/^/  /' "$changed"
          fi

          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "Rust gate: $rust"
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
        if: steps.changes.outputs.rust == 'true'
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        if: steps.changes.outputs.rust == 'true'
        with:
          cache-on-failure: true
      - name: Install native build dependencies
        if: steps.changes.outputs.rust == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            ffmpeg \
            libssl-dev \
            pkg-config \
            protobuf-compiler \
            ripgrep
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Fetch Linux runtime binaries
        if: steps.ci-depth.outputs.full == 'true'
        run: scripts/fetch-binaries.sh --target x86_64-unknown-linux-gnu
      - name: Build desktop renderer
        run: pnpm --filter @cerul/desktop build
      - name: Typecheck Electron shell
        run: pnpm --filter @cerul/electron-shell typecheck
      - name: Rust format check
        if: steps.changes.outputs.rust == 'true'
        run: cargo fmt --all -- --check
      - name: Rust quick check
        if: steps.ci-depth.outputs.full != 'true' && steps.changes.outputs.rust == 'true'
        run: cargo check --workspace --all-targets --locked
      - name: Rust clippy
        if: steps.ci-depth.outputs.full == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Rust tests
        if: steps.ci-depth.outputs.full == 'true'
        # NOTE: two cerul-api reindex tests share an on-disk fixture path and fail
        # only inside the full suite (test-isolation bug, tracked separately).
        # Remove these --skip flags once fixtures use per-test temp dirs.
        env:
          RUST_TEST_THREADS: 1
        run: cargo test --workspace -- --skip item_delete_and_reindex_update_storage --skip concurrent_reindex_requests_queue_without_sqlite_locking
      - name: Run lightweight smoke checks
        if: steps.ci-depth.outputs.full == 'true'
        shell: bash
        run: |
          scripts/smoke-brand-assets-ui.sh
          scripts/smoke-theme-ui.sh
          scripts/smoke-hotkey-overlay.sh
          scripts/smoke-jobs-ui.sh
          scripts/smoke-library-ui.sh
          scripts/smoke-release.sh --dry-run --skip-installers
