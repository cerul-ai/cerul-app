name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        run: |
          url=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep browser_download_url | grep linux_x64.tar.gz | head -1 | cut -d '"' -f4)
          curl -fsSL "$url" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Scan repository
        run: gitleaks dir . --no-banner --redact --exit-code 1

  npm-audit:
    name: pnpm audit (prod)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dependencies (no postinstall binaries)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
