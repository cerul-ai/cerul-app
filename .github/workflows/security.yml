name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        shell: bash
        run: |
          url="https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz"
          curl -fsSL "$url" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
      - name: Scan repository
        run: gitleaks dir . --no-banner --redact --exit-code 1

  npm-audit:
    name: pnpm audit (prod)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dependencies (no postinstall binaries)
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Audit Rust dependencies
        run: cargo audit

  cargo-deny:
    name: Cargo deny
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Check Rust advisories, licenses, and sources
        run: cargo deny check advisories licenses sources
