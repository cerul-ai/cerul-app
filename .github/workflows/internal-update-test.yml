name: Internal Update Test

on:
  workflow_dispatch:
    inputs:
      require_macos_signing:
        description: "Require Developer ID signing and notarization for macOS artifacts"
        required: false
        default: false
        type: boolean
      smoke_installed_app:
        description: "Run installed macOS app smoke after building"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  macos-update-artifacts:
    name: Build macOS update-test artifacts
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: internal-update-${{ runner.os }}-${{ runner.arch }}
          shared-key: cerul-api
          cache-targets: true
          cache-on-failure: true
      - name: Install native build dependencies
        shell: bash
        run: brew install protobuf ffmpeg cmake uv
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache MLX runtime
        uses: actions/cache@v5
        with:
          path: apps/electron-shell/mlx-runtime
          key: mlx-runtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mlx-sidecar/runtime-lock.txt', 'scripts/build-mlx-runtime.sh') }}
      - name: Import Developer ID certificate
        if: inputs.require_macos_signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            echo "CSC_LINK is required when require_macos_signing is enabled." >&2
            exit 2
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when require_macos_signing is enabled." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Build update-test artifacts
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ inputs.require_macos_signing && secrets.CERUL_NOTARIZE || '0' }}
        run: |
          args=()
          if [ "${{ inputs.require_macos_signing }}" = "true" ]; then
            args+=(--require-signing)
          else
            unset APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_APP_SPECIFIC_PASSWORD \
              APPLE_TEAM_ID CERUL_NOTARIZE CSC_LINK CSC_NAME
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Smoke release artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh
      - name: Smoke release footprint
        shell: bash
        run: scripts/smoke-release-footprint.sh
      - name: Smoke installed macOS app
        if: inputs.smoke_installed_app
        shell: bash
        run: scripts/smoke-installed-app.sh
      - name: Smoke macOS signing
        if: inputs.require_macos_signing
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
        run: |
          args=()
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            args+=(--expected-team-id "$APPLE_TEAM_ID")
          fi
          if [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            args+=(--skip-notarization)
          fi
          dmg="$(find target/electron -maxdepth 1 -type f -name '*.dmg' -print 2>/dev/null | sort | tail -1)"
          if [ -z "$dmg" ]; then
            echo "No DMG found under target/electron for macOS signing smoke." >&2
            exit 1
          fi
          scripts/smoke-macos-signing.sh --dmg "$dmg" "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-update-test
          path: |
            target/electron/*.dmg
            target/electron/*.zip
            target/electron/*.yml
            target/electron/*.blockmap
          if-no-files-found: error
