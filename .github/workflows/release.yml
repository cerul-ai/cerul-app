name: Release

on:
  workflow_dispatch:
    inputs:
      require_macos_signing:
        description: "Require Developer ID signing and notarization for macOS artifacts"
        required: false
        default: false
        type: boolean
      live_youtube_smoke:
        description: "Run bounded live YouTube five-video index/search smoke on Linux"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-signing-preflight:
    name: macOS signing preflight
    runs-on: ubuntu-22.04
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
      REQUIRE_MACOS_SIGNING: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
    steps:
      - name: Validate required signing secrets
        shell: bash
        run: |
          if [ "${REQUIRE_MACOS_SIGNING:-false}" != "true" ]; then
            echo "macOS signing is optional for this release run."
            exit 0
          fi

          missing=()
          for name in \
            CSC_LINK \
            CSC_KEY_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_ID \
            APPLE_PASSWORD \
            APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            missing+=("CERUL_NOTARIZE=1")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required macOS release signing inputs:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 2
          fi

  installers:
    name: Build installer (${{ matrix.os }})
    needs: macos-signing-preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: cerul-macos
            deps: brew install protobuf ffmpeg cmake
          - os: ubuntu-22.04
            artifact: cerul-linux
            deps: |
              sudo apt-get update
              sudo apt-get install -y \
                build-essential \
                cmake \
                curl \
                dbus-x11 \
                ffmpeg \
                libayatana-appindicator3-dev \
                librsvg2-dev \
                libssl-dev \
                patchelf \
                protobuf-compiler \
                ripgrep \
                wget \
                xauth \
                xvfb
              sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          - os: windows-latest
            artifact: cerul-windows
            deps: choco install ffmpeg protoc cmake -y
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native build dependencies
        shell: bash
        run: ${{ matrix.deps }}
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MACOS_SIGNING: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "CSC_LINK is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "No CSC_LINK secret configured; building unsigned (skipping keychain import)."
            exit 0
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - name: Build installers
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          args=()
          if [ "$RUNNER_OS" = "macOS" ] && [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            args+=(--require-signing)
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Smoke release artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh
      - name: Smoke release footprint
        shell: bash
        run: scripts/smoke-release-footprint.sh
      - name: Smoke live YouTube source
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.live_youtube_smoke == 'true' && runner.os == 'Linux'
        shell: bash
        run: scripts/smoke-youtube-source.sh --live --fetch-first --index-first --index-count 5 --max 5 --clip-duration-sec 12
      - name: Smoke installed macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: scripts/smoke-installed-app.sh
      - name: Smoke daemon autostart macOS
        if: runner.os == 'macOS'
        shell: bash
        run: scripts/smoke-daemon-autostart-macos.sh
      - name: Smoke daemon autostart Linux
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/smoke-daemon-autostart-linux.sh
      - name: Smoke installed Linux runtime
        if: runner.os == 'Linux'
        shell: bash
        run: scripts/smoke-installed-runtime-linux.sh
      - name: Smoke daemon autostart Windows
        if: runner.os == 'Windows'
        shell: bash
        run: scripts/smoke-daemon-autostart-windows.sh
      - name: Smoke installed Windows runtime
        if: runner.os == 'Windows'
        shell: bash
        run: scripts/smoke-installed-runtime-windows.sh
      - name: Smoke macOS signing
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "APPLE_SIGNING_IDENTITY is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "Skipping signing smoke; APPLE_SIGNING_IDENTITY is not configured."
            exit 0
          fi
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ] && [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            echo "CERUL_NOTARIZE=1 is required for signed macOS release artifacts." >&2
            exit 2
          fi

          args=()
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            args+=(--expected-team-id "$APPLE_TEAM_ID")
          fi
          if [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            args+=(--skip-notarization)
          fi

          dmg="$(find target/electron -maxdepth 1 -type f -name '*.dmg' -print 2>/dev/null | sort | tail -1)"
          if [ -n "$dmg" ]; then
            args+=(--dmg "$dmg")
          elif [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            echo "No DMG found under target/electron for mandatory macOS signing smoke." >&2
            exit 1
          fi

          scripts/smoke-macos-signing.sh "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/electron/*.dmg
            target/electron/*.zip
            target/electron/*.exe
            target/electron/*.AppImage
            target/electron/*.deb
            target/electron/*.rpm
            target/electron/*.yml
            target/electron/*.blockmap
          if-no-files-found: error
  publish-release-assets:
    name: Publish GitHub release assets
    needs: installers
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.zip
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.yml
            release-assets/**/*.blockmap
