name: Release

on:
  workflow_dispatch:
    inputs:
      require_macos_signing:
        description: "Require Developer ID signing and notarization for macOS artifacts"
        required: false
        default: false
        type: boolean
      live_youtube_smoke:
        description: "Run bounded live YouTube five-video index/search smoke on Linux"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-update-assets:
    name: Build macOS update assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore same-SHA macOS update prebuild
        id: prebuilt-update
        uses: actions/cache/restore@v4
        with:
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
          key: cerul-macos-update-${{ github.sha }}

      - name: Extract cached app bundle
        if: steps.prebuilt-update.outputs.cache-hit == 'true'
        shell: bash
        run: |
          if [ ! -f target/electron/Cerul.app.tar.gz ]; then
            echo "Cached prebuild did not include Cerul.app.tar.gz." >&2
            exit 1
          fi
          rm -rf target/electron/prepackaged
          mkdir -p target/electron/prepackaged
          tar -C target/electron/prepackaged -xzf target/electron/Cerul.app.tar.gz

      - uses: pnpm/action-setup@v6
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
      - name: Cache Rust build outputs
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-${{ runner.os }}-${{ runner.arch }}
          shared-key: cerul-api
          cache-targets: true
          cache-on-failure: true
      - name: Install native build dependencies
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: brew install protobuf ffmpeg cmake uv
      - name: Install frontend dependencies
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Cache signed MLX runtime
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: apps/electron-shell/mlx-runtime
          key: mlx-runtime-signed-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mlx-sidecar/runtime-lock.txt', 'scripts/build-mlx-runtime.sh', 'apps/electron-shell/scripts/sign-mlx-runtime.cjs', 'apps/electron-shell/entitlements/entitlements.mlx-runtime.plist') }}
      - name: Import Developer ID certificate
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "CSC_LINK is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "No CSC_LINK secret configured; building unsigned (skipping keychain import)."
            exit 0
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - name: Build fast macOS update assets
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          args=(--mac-targets zip)
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            args+=(--require-signing)
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Archive app bundle for DMG job
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          tar -C "$(dirname "$app_path")" -czf target/electron/Cerul.app.tar.gz Cerul.app
      - name: Locate update app bundle
        id: update-app
        shell: bash
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
      - name: Smoke macOS update artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh --macos-update-only
      - name: Smoke macOS update app signing
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          args=(--app "${{ steps.update-app.outputs.app_path }}")
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            args+=(--expected-team-id "$APPLE_TEAM_ID")
          fi
          if [ "${REQUIRE_MACOS_SIGNING:-false}" != "true" ]; then
            args+=(--allow-ad-hoc --skip-notarization)
          fi
          scripts/smoke-macos-signing.sh "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-update
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz.sha256
            apps/electron-shell/mlx-runtime-manifest.json
          if-no-files-found: error

  publish-update-assets:
    name: Publish macOS update assets
    needs: macos-update-assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-update
          path: release-assets
      - name: Upload update assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --latest --verify-tag
          fi
          mapfile -d '' files < <(find release-assets -type f \( -name "*.zip" -o -name "*.zip.blockmap" -o -name "latest-mac.yml" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No update assets found to upload." >&2
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
      - name: Upload update assets to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CERUL_UPDATES_R2_BUCKET: ${{ secrets.CERUL_UPDATES_R2_BUCKET }}
          CERUL_UPDATES_R2_PREFIX: ${{ vars.CERUL_UPDATES_R2_PREFIX }}
        run: |
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            CLOUDFLARE_R2_ACCOUNT_ID
            CERUL_UPDATES_R2_BUCKET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "R2 upload cannot continue: $name is not configured." >&2
              exit 1
            fi
          done
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          endpoint="https://${CLOUDFLARE_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${CERUL_UPDATES_R2_PREFIX:-}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          mapfile -d '' files < <(find release-assets -type f \( -name "*.zip" -o -name "*.zip.blockmap" -o -name "latest-mac.yml" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No update assets found to upload." >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            key="$name"
            if [ -n "$prefix" ]; then
              key="$prefix/$name"
            fi
            cache_control="public, max-age=31536000, immutable"
            if [ "$name" = "latest-mac.yml" ]; then
              cache_control="public, max-age=300"
            fi
            content_type="application/octet-stream"
            case "$name" in
              *.yml) content_type="application/yaml" ;;
              *.zip) content_type="application/zip" ;;
            esac
            aws s3 cp "$file" "s3://${CERUL_UPDATES_R2_BUCKET}/${key}" \
              --endpoint-url "$endpoint" \
              --cache-control "$cache_control" \
              --content-type "$content_type"
          done
          manifest="$(find release-assets -type f -name "mlx-runtime-manifest.json" -print -quit)"
          archive="$(find release-assets -type f -name "mlx-runtime.tar.gz" -print -quit)"
          checksum="$(find release-assets -type f -name "mlx-runtime.tar.gz.sha256" -print -quit)"
          if [ -z "$manifest" ] || [ -z "$archive" ] || [ -z "$checksum" ]; then
            echo "No MLX runtime archive, checksum, or manifest found to upload." >&2
            exit 1
          fi
          archive_name="$(node -e 'const fs=require("fs"); const path=process.argv[1]; const manifest=JSON.parse(fs.readFileSync(path, "utf8")); if (!manifest.archive) process.exit(2); process.stdout.write(manifest.archive)' "$manifest")"
          runtime_prefix="runtime"
          if [ -n "$prefix" ]; then
            runtime_prefix="$prefix/$runtime_prefix"
          fi
          aws s3 cp "$archive" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/${archive_name}" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/gzip"
          aws s3 cp "$checksum" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/${archive_name}.sha256" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/plain"
          aws s3 cp "$manifest" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/mlx-runtime-manifest.json" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"

  macos-dmg-assets:
    name: Build macOS DMG assets
    needs: macos-update-assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Import Developer ID certificate
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "CSC_LINK is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "No CSC_LINK secret configured; building unsigned (skipping keychain import)."
            exit 0
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-update
          path: target/electron
      - name: Extract prepackaged app bundle
        id: prepackaged-app
        shell: bash
        run: |
          app_archive="$(find target/electron -type f -name Cerul.app.tar.gz -print -quit)"
          if [ -z "$app_archive" ]; then
            echo "Update artifact did not include Cerul.app.tar.gz." >&2
            find target/electron -maxdepth 4 -type f -print >&2
            exit 1
          fi
          prepackaged_dir="$RUNNER_TEMP/cerul-prepackaged-app"
          rm -rf "$prepackaged_dir"
          mkdir -p "$prepackaged_dir"
          tar -C "$prepackaged_dir" -xzf "$app_archive"
          app_path="$prepackaged_dir/Cerul.app"
          if [ ! -d "$app_path" ]; then
            echo "Extracted prepackaged app was not found at $app_path." >&2
            find "$prepackaged_dir" -maxdepth 3 -print >&2
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
      - name: Build macOS DMG from prepackaged app
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          args=(--mac-targets dmg --prepackaged-app "${{ steps.prepackaged-app.outputs.app_path }}")
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            args+=(--require-signing)
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Smoke macOS DMG artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh --app "${{ steps.prepackaged-app.outputs.app_path }}"
      - name: Smoke release footprint
        shell: bash
        run: scripts/smoke-release-footprint.sh
      - name: Smoke installed macOS app
        continue-on-error: true
        shell: bash
        run: scripts/smoke-installed-app.sh
      - name: Smoke daemon autostart macOS
        continue-on-error: true
        shell: bash
        run: scripts/smoke-daemon-autostart-macos.sh --app "${{ steps.prepackaged-app.outputs.app_path }}"
      - name: Smoke macOS DMG signing
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.require_macos_signing) }}
        run: |
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ] && [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY is required for signed macOS release artifacts." >&2
            exit 2
          fi
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ] && [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            echo "CERUL_NOTARIZE=1 is required for signed macOS release artifacts." >&2
            exit 2
          fi

          args=()
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY is not configured; verifying ad-hoc signed artifact."
            args+=(--allow-ad-hoc --skip-notarization)
          else
            if [ -n "${APPLE_TEAM_ID:-}" ]; then
              args+=(--expected-team-id "$APPLE_TEAM_ID")
            fi
            if [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
              args+=(--skip-notarization)
            fi
          fi

          dmg="$(find target/electron -maxdepth 1 -type f -name '*.dmg' -print 2>/dev/null | sort | tail -1)"
          if [ -n "$dmg" ]; then
            args+=(--dmg "$dmg")
          elif [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            echo "No DMG found under target/electron for mandatory macOS signing smoke." >&2
            exit 1
          fi

          scripts/smoke-macos-signing.sh "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-dmg
          path: |
            target/electron/*.dmg
            target/electron/*.dmg.blockmap
          if-no-files-found: error

  publish-dmg-assets:
    name: Publish macOS DMG assets
    needs:
      - publish-update-assets
      - macos-dmg-assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-dmg
          path: release-assets
      - name: Upload DMG assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -d '' files < <(find release-assets -type f \( -name "*.dmg" -o -name "*.dmg.blockmap" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No DMG assets found to upload." >&2
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
