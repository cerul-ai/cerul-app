name: Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Create a Release x.y.z commit and vX.Y.Z tag from the default branch"
        required: true
        type: string
      require_macos_signing:
        description: "Require Developer ID signing and notarization for macOS artifacts"
        required: false
        default: false
        type: boolean
      live_youtube_smoke:
        description: "Run bounded live YouTube five-video index/search smoke on Linux"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release tag
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - name: Require release token
        shell: bash
        env:
          CERUL_RELEASE_TOKEN: ${{ secrets.CERUL_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CERUL_RELEASE_TOKEN:-}" ]; then
            echo "::error::CERUL_RELEASE_TOKEN is required so the release tag push triggers the tag-based Release workflow."
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.CERUL_RELEASE_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Prepare release commit and tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          tag="v${RELEASE_VERSION}"
          git fetch origin "$DEFAULT_BRANCH" --tags
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            echo "Tag $tag already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists on origin." >&2
            exit 1
          fi
          node scripts/prepare-release.mjs "$RELEASE_VERSION"
          git status --short
          git add package.json apps/desktop/package.json apps/electron-shell/package.json
          if git diff --cached --quiet; then
            echo "No release version changes staged." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Release $RELEASE_VERSION"
          git tag -a "$tag" -m "Cerul $RELEASE_VERSION"
          git push --atomic origin "HEAD:$DEFAULT_BRANCH" "$tag"

  release-context:
    name: Resolve release target
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    outputs:
      is_release: ${{ steps.tag.outputs.is_release || 'false' }}
      release_ref: ${{ steps.tag.outputs.release_ref || github.ref }}
      release_sha: ${{ steps.tag.outputs.release_sha || github.sha }}
      release_tag: ${{ steps.tag.outputs.release_tag || '' }}
      release_version: ${{ steps.tag.outputs.release_version || '' }}
    steps:
      - name: Resolve pushed tag
        id: tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "is_release=true"
            echo "release_ref=${GITHUB_REF}"
            echo "release_sha=${GITHUB_SHA}"
            echo "release_tag=${GITHUB_REF_NAME}"
            echo "release_version=$version"
          } >> "$GITHUB_OUTPUT"

  ytdlp-preflight:
    name: Check bundled yt-dlp pin
    needs: release-context
    if: needs.release-context.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Check bundled yt-dlp pin
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-ytdlp-release.mjs

  macos-update-assets:
    name: Build macOS update assets
    needs:
      - release-context
      - ytdlp-preflight
    if: needs.release-context.outputs.is_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}

      - name: Restore same-SHA macOS update prebuild
        id: prebuilt-update
        uses: actions/cache/restore@v5
        with:
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz.sha256
            apps/electron-shell/mlx-runtime-manifest.json
          key: cerul-macos-update-${{ needs.release-context.outputs.release_sha }}

      - name: Extract cached app bundle
        if: steps.prebuilt-update.outputs.cache-hit == 'true'
        shell: bash
        run: |
          if [ ! -f target/electron/Cerul.app.tar.gz ]; then
            echo "Cached prebuild did not include Cerul.app.tar.gz." >&2
            exit 1
          fi
          rm -rf target/electron/prepackaged
          mkdir -p target/electron/prepackaged
          tar -C target/electron/prepackaged -xzf target/electron/Cerul.app.tar.gz

      - uses: pnpm/action-setup@v6
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - uses: dtolnay/rust-toolchain@stable
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
      - name: Cache Rust build outputs
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-${{ runner.os }}-${{ runner.arch }}
          shared-key: cerul-api
          cache-targets: true
          cache-on-failure: true
      - name: Install native build dependencies
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: brew install protobuf ffmpeg cmake uv
      - name: Install frontend dependencies
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - name: Cache signed MLX runtime
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        uses: actions/cache@v5
        with:
          path: apps/electron-shell/mlx-runtime
          key: mlx-runtime-signed-v1-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mlx-sidecar/runtime-lock.txt', 'scripts/build-mlx-runtime.sh', 'apps/electron-shell/scripts/sign-mlx-runtime.cjs', 'apps/electron-shell/entitlements/entitlements.mlx-runtime.plist') }}
      - name: Import Developer ID certificate
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "CSC_LINK is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "No CSC_LINK secret configured; building unsigned (skipping keychain import)."
            exit 0
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - name: Build fast macOS update assets
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          args=(--mac-targets zip)
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            args+=(--require-signing)
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Archive app bundle for DMG job
        if: steps.prebuilt-update.outputs.cache-hit != 'true'
        shell: bash
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          tar -C "$(dirname "$app_path")" -czf target/electron/Cerul.app.tar.gz Cerul.app
      - name: Locate update app bundle
        id: update-app
        shell: bash
        run: |
          app_path="$(find target/electron -maxdepth 4 -type d -name Cerul.app -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No Cerul.app bundle found under target/electron." >&2
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
      - name: Smoke macOS update artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh --macos-update-only
      - name: Smoke macOS update app signing
        shell: bash
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          args=(--app "${{ steps.update-app.outputs.app_path }}")
          if [ -n "${APPLE_TEAM_ID:-}" ]; then
            args+=(--expected-team-id "$APPLE_TEAM_ID")
          fi
          if [ "${REQUIRE_MACOS_SIGNING:-false}" != "true" ]; then
            args+=(--allow-ad-hoc --skip-notarization)
          fi
          runtime_archive="$(find target/electron apps/electron-shell -type f -name mlx-runtime.tar.gz -print -quit 2>/dev/null || true)"
          if [ -n "$runtime_archive" ]; then
            export CERUL_MLX_RUNTIME_ARCHIVE="$runtime_archive"
          fi
          scripts/smoke-macos-signing.sh "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-update
          path: |
            target/electron/*.zip
            target/electron/*.zip.blockmap
            target/electron/latest-mac.yml
            target/electron/Cerul.app.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz
            apps/electron-shell/mlx-runtime.tar.gz.sha256
            apps/electron-shell/mlx-runtime-manifest.json
          if-no-files-found: error

  publish-update-assets:
    name: Publish macOS update assets
    needs:
      - release-context
      - macos-update-assets
    if: needs.release-context.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-update
          path: release-assets
      - name: Upload update assets to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CERUL_UPDATES_R2_BUCKET: ${{ secrets.CERUL_UPDATES_R2_BUCKET }}
          CERUL_UPDATES_R2_PREFIX: ${{ vars.CERUL_UPDATES_R2_PREFIX }}
          CERUL_UPDATES_PUBLIC_BASE_URL: ${{ vars.CERUL_UPDATES_PUBLIC_BASE_URL }}
          RELEASE_VERSION: ${{ needs.release-context.outputs.release_version }}
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            CLOUDFLARE_R2_ACCOUNT_ID
            CERUL_UPDATES_R2_BUCKET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "R2 upload cannot continue: $name is not configured." >&2
              exit 1
            fi
          done
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          endpoint="https://${CLOUDFLARE_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${CERUL_UPDATES_R2_PREFIX:-}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          mapfile -d '' files < <(find release-assets -type f \( -name "*.zip" -o -name "*.zip.blockmap" -o -name "latest-mac.yml" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No update assets found to upload." >&2
            exit 1
          fi
          latest_file=""
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            if [ "$name" = "latest-mac.yml" ]; then
              latest_file="$file"
              continue
            fi
            key="$name"
            if [ -n "$prefix" ]; then
              key="$prefix/$name"
            fi
            content_type="application/octet-stream"
            case "$name" in
              *.zip) content_type="application/zip" ;;
            esac
            aws s3 cp "$file" "s3://${CERUL_UPDATES_R2_BUCKET}/${key}" \
              --endpoint-url "$endpoint" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "$content_type"
          done
          if [ -z "$latest_file" ]; then
            echo "No latest-mac.yml found in update assets." >&2
            exit 1
          fi
          metadata_version="$(sed -n 's/^version:[[:space:]]*//p' "$latest_file" | tr -d "'\"" | head -1)"
          if [ "$metadata_version" != "$RELEASE_VERSION" ]; then
            echo "latest-mac.yml version $metadata_version does not match release $RELEASE_VERSION." >&2
            exit 1
          fi
          primary_path="$(sed -n 's/^path:[[:space:]]*//p' "$latest_file" | tr -d "'\"" | head -1)"
          if [ -z "$primary_path" ]; then
            echo "latest-mac.yml does not include a primary path." >&2
            exit 1
          fi
          manifest="$(find release-assets -type f -name "mlx-runtime-manifest.json" -print -quit)"
          archive="$(find release-assets -type f -name "mlx-runtime.tar.gz" -print -quit)"
          checksum="$(find release-assets -type f -name "mlx-runtime.tar.gz.sha256" -print -quit)"
          if [ -z "$manifest" ] || [ -z "$archive" ] || [ -z "$checksum" ]; then
            echo "No MLX runtime archive, checksum, or manifest found to upload." >&2
            exit 1
          fi
          archive_name="$(node -e 'const fs=require("fs"); const path=process.argv[1]; const manifest=JSON.parse(fs.readFileSync(path, "utf8")); if (!manifest.archive) process.exit(2); process.stdout.write(manifest.archive)' "$manifest")"
          runtime_prefix="runtime"
          if [ -n "$prefix" ]; then
            runtime_prefix="$prefix/$runtime_prefix"
          fi
          aws s3 cp "$archive" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/${archive_name}" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/gzip"
          aws s3 cp "$checksum" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/${archive_name}.sha256" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/plain"
          aws s3 cp "$manifest" "s3://${CERUL_UPDATES_R2_BUCKET}/${runtime_prefix}/mlx-runtime-manifest.json" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=300" \
            --content-type "application/json"
          public_base="${CERUL_UPDATES_PUBLIC_BASE_URL:-https://updates.cerul.ai}"
          public_prefix="${public_base%/}"
          if [ -n "$prefix" ]; then
            public_prefix="$public_prefix/$prefix"
          fi
          primary_url="$public_prefix/$primary_path"
          if ! curl -fsSI "$primary_url" >/dev/null; then
            curl -fsSL --range 0-0 "$primary_url" >/dev/null
          fi
          echo "Verified versioned updater asset $primary_url"

  macos-dmg-assets:
    name: Build macOS DMG assets
    needs:
      - release-context
      - macos-update-assets
    if: needs.release-context.outputs.is_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Import Developer ID certificate
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          if [ -z "${CSC_LINK:-}" ]; then
            if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
              echo "CSC_LINK is required for signed macOS release artifacts." >&2
              exit 2
            fi
            echo "No CSC_LINK secret configured; building unsigned (skipping keychain import)."
            exit 0
          fi
          if [ -z "${CSC_KEY_PASSWORD:-}" ]; then
            echo "CSC_KEY_PASSWORD is required when CSC_LINK is configured." >&2
            exit 2
          fi
          KEYCHAIN="$RUNNER_TEMP/cerul-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported Developer ID certificate into a temporary keychain."
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-update
          path: target/electron
      - name: Extract prepackaged app bundle
        id: prepackaged-app
        shell: bash
        run: |
          app_archive="$(find target/electron -type f -name Cerul.app.tar.gz -print -quit)"
          if [ -z "$app_archive" ]; then
            echo "Update artifact did not include Cerul.app.tar.gz." >&2
            find target/electron -maxdepth 4 -type f -print >&2
            exit 1
          fi
          prepackaged_dir="$RUNNER_TEMP/cerul-prepackaged-app"
          rm -rf "$prepackaged_dir"
          mkdir -p "$prepackaged_dir"
          tar -C "$prepackaged_dir" -xzf "$app_archive"
          app_path="$prepackaged_dir/Cerul.app"
          if [ ! -d "$app_path" ]; then
            echo "Extracted prepackaged app was not found at $app_path." >&2
            find "$prepackaged_dir" -maxdepth 3 -print >&2
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"
      - name: Build macOS DMG from prepackaged app
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          args=(--mac-targets dmg --prepackaged-app "${{ steps.prepackaged-app.outputs.app_path }}")
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            args+=(--require-signing)
          fi
          scripts/build-installers.sh "${args[@]}"
      - name: Smoke macOS DMG artifacts
        shell: bash
        run: scripts/smoke-release-artifacts.sh --app "${{ steps.prepackaged-app.outputs.app_path }}"
      - name: Smoke release footprint
        shell: bash
        run: scripts/smoke-release-footprint.sh
      - name: Smoke installed macOS app
        continue-on-error: true
        shell: bash
        run: scripts/smoke-installed-app.sh
      - name: Smoke daemon autostart macOS
        continue-on-error: true
        shell: bash
        run: scripts/smoke-daemon-autostart-macos.sh --app "${{ steps.prepackaged-app.outputs.app_path }}"
      - name: Smoke macOS DMG signing
        shell: bash
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CERUL_NOTARIZE: ${{ secrets.CERUL_NOTARIZE }}
          REQUIRE_MACOS_SIGNING: ${{ needs.release-context.outputs.is_release == 'true' || inputs.require_macos_signing }}
        run: |
          if [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ] && [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY is required for signed macOS release artifacts." >&2
            exit 2
          fi
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ] && [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ] && [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
            echo "CERUL_NOTARIZE=1 is required for signed macOS release artifacts." >&2
            exit 2
          fi

          args=()
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_SIGNING_IDENTITY is not configured; verifying ad-hoc signed artifact."
            args+=(--allow-ad-hoc --skip-notarization)
          else
            if [ -n "${APPLE_TEAM_ID:-}" ]; then
              args+=(--expected-team-id "$APPLE_TEAM_ID")
            fi
            if [ "${CERUL_NOTARIZE:-0}" != "1" ]; then
              args+=(--skip-notarization)
            fi
          fi

          dmg="$(find target/electron -maxdepth 1 -type f -name '*.dmg' -print 2>/dev/null | sort | tail -1)"
          if [ -n "$dmg" ]; then
            args+=(--dmg "$dmg")
          elif [ "${REQUIRE_MACOS_SIGNING:-false}" = "true" ]; then
            echo "No DMG found under target/electron for mandatory macOS signing smoke." >&2
            exit 1
          fi

          runtime_archive="$(find target/electron -type f -name mlx-runtime.tar.gz -print -quit)"
          if [ -n "$runtime_archive" ]; then
            export CERUL_MLX_RUNTIME_ARCHIVE="$runtime_archive"
          fi
          scripts/smoke-macos-signing.sh "${args[@]}"
      - uses: actions/upload-artifact@v7
        with:
          name: cerul-macos-dmg
          path: |
            target/electron/*.dmg
            target/electron/*.dmg.blockmap
          if-no-files-found: error

  publish-dmg-assets:
    name: Publish macOS DMG assets
    needs:
      - release-context
      - publish-update-assets
      - macos-dmg-assets
    if: needs.release-context.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-dmg
          path: release-assets/dmg
      - uses: actions/download-artifact@v8
        with:
          name: cerul-macos-update
          path: release-assets/update
      - name: Upload DMG assets to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CERUL_UPDATES_R2_BUCKET: ${{ secrets.CERUL_UPDATES_R2_BUCKET }}
          CERUL_UPDATES_R2_PREFIX: ${{ vars.CERUL_UPDATES_R2_PREFIX }}
        run: |
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            CLOUDFLARE_R2_ACCOUNT_ID
            CERUL_UPDATES_R2_BUCKET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "R2 upload cannot continue: $name is not configured." >&2
              exit 1
            fi
          done
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          endpoint="https://${CLOUDFLARE_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${CERUL_UPDATES_R2_PREFIX:-}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          mapfile -d '' files < <(find release-assets/dmg -type f \( -name "*.dmg" -o -name "*.dmg.blockmap" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No DMG assets found to upload." >&2
            exit 1
          fi
          for file in "${files[@]}"; do
            name="$(basename "$file")"
            key="$name"
            if [ -n "$prefix" ]; then
              key="$prefix/$name"
            fi
            content_type="application/octet-stream"
            case "$name" in
              *.dmg) content_type="application/x-apple-diskimage" ;;
            esac
            aws s3 cp "$file" "s3://${CERUL_UPDATES_R2_BUCKET}/${key}" \
              --endpoint-url "$endpoint" \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "$content_type"
          done
          dmg="$(find release-assets/dmg -type f -name "*.dmg" -print | sort | tail -1)"
          if [ -z "$dmg" ]; then
            echo "No DMG found in release assets." >&2
            exit 1
          fi
      - name: Upload release assets to draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$tag" --draft --verify-tag --notes "Release assets staged; updater metadata publishes last."
          fi
          mapfile -d '' files < <(find release-assets -type f \( -name "*.zip" -o -name "*.zip.blockmap" -o -name "latest-mac.yml" -o -name "*.dmg" -o -name "*.dmg.blockmap" \) -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found to upload." >&2
            exit 1
          fi
          gh release upload "$tag" "${files[@]}" --clobber
      - name: Publish updater metadata to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CERUL_UPDATES_R2_BUCKET: ${{ secrets.CERUL_UPDATES_R2_BUCKET }}
          CERUL_UPDATES_R2_PREFIX: ${{ vars.CERUL_UPDATES_R2_PREFIX }}
          CERUL_UPDATES_PUBLIC_BASE_URL: ${{ vars.CERUL_UPDATES_PUBLIC_BASE_URL }}
          RELEASE_VERSION: ${{ needs.release-context.outputs.release_version }}
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            CLOUDFLARE_R2_ACCOUNT_ID
            CERUL_UPDATES_R2_BUCKET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "R2 upload cannot continue: $name is not configured." >&2
              exit 1
            fi
          done
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          endpoint="https://${CLOUDFLARE_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${CERUL_UPDATES_R2_PREFIX:-}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          latest_file="$(find release-assets/update -type f -name "latest-mac.yml" -print -quit)"
          if [ -z "$latest_file" ]; then
            echo "No latest-mac.yml found in update assets." >&2
            exit 1
          fi
          metadata_version="$(sed -n 's/^version:[[:space:]]*//p' "$latest_file" | tr -d "'\"" | head -1)"
          if [ "$metadata_version" != "$RELEASE_VERSION" ]; then
            echo "latest-mac.yml version $metadata_version does not match release $RELEASE_VERSION." >&2
            exit 1
          fi
          primary_path="$(sed -n 's/^path:[[:space:]]*//p' "$latest_file" | tr -d "'\"" | head -1)"
          if [ -z "$primary_path" ]; then
            echo "latest-mac.yml does not include a primary path." >&2
            exit 1
          fi
          latest_key="latest-mac.yml"
          if [ -n "$prefix" ]; then
            latest_key="$prefix/$latest_key"
          fi
          aws s3 cp "$latest_file" "s3://${CERUL_UPDATES_R2_BUCKET}/${latest_key}" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=60, must-revalidate" \
            --content-type "application/yaml"

          public_base="${CERUL_UPDATES_PUBLIC_BASE_URL:-https://updates.cerul.ai}"
          public_prefix="${public_base%/}"
          if [ -n "$prefix" ]; then
            public_prefix="$public_prefix/$prefix"
          fi
          primary_url="$public_prefix/$primary_path"
          if ! curl -fsSI "$primary_url" >/dev/null; then
            curl -fsSL --range 0-0 "$primary_url" >/dev/null
          fi
          latest_url="$public_prefix/latest-mac.yml"
          seen_version=""
          latest_body=""
          for attempt in $(seq 1 36); do
            latest_body="$(curl -fsSL -H "Cache-Control: no-cache" "$latest_url" 2>/dev/null || true)"
            seen_version="$(printf '%s\n' "$latest_body" | sed -n 's/^version:[[:space:]]*//p' | tr -d "'\"" | head -1)"
            if [ "$seen_version" = "$RELEASE_VERSION" ]; then
              break
            fi
            echo "Waiting for $latest_url to report $RELEASE_VERSION (attempt $attempt, saw ${seen_version:-none})."
            sleep 10
          done
          if [ "$seen_version" != "$RELEASE_VERSION" ]; then
            echo "CDN updater metadata did not publish $RELEASE_VERSION." >&2
            printf '%s\n' "$latest_body" >&2
            exit 1
          fi
          echo "Verified updater metadata $latest_url version=$seen_version primary=$primary_path"
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG"
          gh release edit "$tag" --draft=false --latest
      - name: Publish stable DMG aliases to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
          CERUL_UPDATES_R2_BUCKET: ${{ secrets.CERUL_UPDATES_R2_BUCKET }}
          CERUL_UPDATES_R2_PREFIX: ${{ vars.CERUL_UPDATES_R2_PREFIX }}
        run: |
          set -euo pipefail
          required=(
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            CLOUDFLARE_R2_ACCOUNT_ID
            CERUL_UPDATES_R2_BUCKET
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "R2 upload cannot continue: $name is not configured." >&2
              exit 1
            fi
          done
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          endpoint="https://${CLOUDFLARE_R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          prefix="${CERUL_UPDATES_R2_PREFIX:-}"
          prefix="${prefix#/}"
          prefix="${prefix%/}"
          dmg="$(find release-assets/dmg -type f -name "*.dmg" -print | sort | tail -1)"
          if [ -z "$dmg" ]; then
            echo "No DMG found for stable macOS download alias." >&2
            exit 1
          fi
          stable_dmg_key="Cerul-mac.dmg"
          if [ -n "$prefix" ]; then
            stable_dmg_key="$prefix/$stable_dmg_key"
          fi
          aws s3 cp "$dmg" "s3://${CERUL_UPDATES_R2_BUCKET}/${stable_dmg_key}" \
            --endpoint-url "$endpoint" \
            --cache-control "public, max-age=300" \
            --content-type "application/x-apple-diskimage" \
            --content-disposition "attachment; filename=\"$(basename "$dmg")\""

          dmg_blockmap="${dmg}.blockmap"
          if [ -f "$dmg_blockmap" ]; then
            stable_blockmap_key="Cerul-mac.dmg.blockmap"
            if [ -n "$prefix" ]; then
              stable_blockmap_key="$prefix/$stable_blockmap_key"
            fi
            aws s3 cp "$dmg_blockmap" "s3://${CERUL_UPDATES_R2_BUCKET}/${stable_blockmap_key}" \
              --endpoint-url "$endpoint" \
              --cache-control "public, max-age=300" \
              --content-type "application/octet-stream" \
              --content-disposition "attachment; filename=\"$(basename "$dmg_blockmap")\""
          fi

  announce:
    name: AI release notes + Discord announcement
    needs:
      - release-context
      - publish-dmg-assets
    if: needs.release-context.outputs.is_release == 'true'
    # Best-effort: a failure here must never affect the release that already shipped.
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.release_ref }}
          fetch-depth: 0 # full history + tags so we can diff the commit range
      - name: Generate AI release notes (GitHub / Discord / Tweet)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          DOWNLOAD_URL: ${{ vars.DOWNLOAD_URL }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          bash scripts/ai-release-notes.sh "$TAG" --out notes --channels github
          bash scripts/ai-release-notes.sh "$TAG" --out notes --channels discord \
            || echo "Discord notes generation failed; GitHub release notes will still be published."
          bash scripts/ai-release-notes.sh "$TAG" --out notes --channels tweet \
            || echo "Tweet draft generation failed; GitHub release notes will still be published."
      - name: Replace GitHub release body with AI notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          if [ -s notes/notes.github.md ]; then
            marker="<!-- cerul-discord-announced:${TAG} -->"
            existing_body="$(gh release view "$TAG" --json body -q .body 2>/dev/null || true)"
            if printf '%s\n' "$existing_body" | grep -Fq "$marker" && ! grep -Fq "$marker" notes/notes.github.md; then
              printf '\n%s\n' "$marker" >> notes/notes.github.md
            fi
            gh release edit "$TAG" --notes-file notes/notes.github.md
            echo "Updated release notes for $TAG."
          else
            echo "No AI notes generated; leaving the existing release body untouched."
          fi
      - name: Announce on Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-context.outputs.release_tag }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ] || [ ! -s notes/notes.discord.md ]; then
            echo "Webhook or Discord notes missing; skipping Discord announcement."
            exit 0
          fi
          marker="<!-- cerul-discord-announced:${TAG} -->"
          release_body="$(gh release view "$TAG" --json body -q .body 2>/dev/null || true)"
          if printf '%s\n' "$release_body" | grep -Fq "$marker"; then
            echo "Discord announcement for ${TAG} was already recorded; skipping rerun duplicate."
            exit 0
          fi
          printf '%s\n\n%s\n' "$release_body" "$marker" > notes/release-body-with-discord-marker.md
          gh release edit "$TAG" --notes-file notes/release-body-with-discord-marker.md
          desc="$(cat notes/notes.discord.md)"; desc="${desc:0:3800}"
          payload="$(jq -n \
            --arg content "🚀 **Cerul ${TAG} is out!**" \
            --arg title "Cerul ${TAG}" \
            --arg url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}" \
            --arg desc "$desc" \
            '{username:"Cerul Releases", content:$content,
              embeds:[{title:$title, url:$url, description:$desc, color:4090781}]}')"
          if ! curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"; then
            printf '%s\n' "$release_body" > notes/release-body-before-discord-marker.md
            gh release edit "$TAG" --notes-file notes/release-body-before-discord-marker.md
            echo "Discord announcement failed; removed recorded marker so a rerun can retry."
            exit 1
          fi
          echo "Announced ${TAG} on Discord."
      - name: Surface tweet draft for manual posting
        if: always()
        run: |
          {
            echo "## Cerul ${{ needs.release-context.outputs.release_tag }} — tweet draft (post manually)"
            echo '```'
            cat notes/notes.tweet.txt 2>/dev/null || echo "(none generated)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: release-notes-${{ needs.release-context.outputs.release_tag }}
          path: notes/
          if-no-files-found: warn
