[graph]
all-features = false

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste is pulled in transitively by Candle/tokenizers/rav1e; no safe upgrade is available yet." },
]

[licenses]
confidence-threshold = 0.8
allow = [
  # Cerul's own workspace crates (source-available); the rest below are
  # third-party dependency licenses we permit.
  "LicenseRef-FSL-1.1-ALv2",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "NCSA",
  "Unlicense",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
allow-workspace = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
