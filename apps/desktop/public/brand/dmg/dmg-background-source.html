<!doctype html>
<html lang="zh"><head><meta charset="utf-8"><style>
  *{margin:0;box-sizing:border-box;}
  html,body{width:660px;height:400px;overflow:hidden;}
  body{
    font-family:-apple-system,system-ui,"PingFang SC","Hiragino Sans GB","Segoe UI",Roboto,sans-serif;
    position:relative;
    /* Near-uniform near-white so a resized DMG window shows no colour seam
       (Finder fills any area beyond the background with ~white). The depth
       comes from a soft top-centre glow, not a top-to-bottom gradient. */
    background:
      radial-gradient(760px 360px at 50% -4%,#ffffff,rgba(255,255,255,0) 68%),
      #fcfdfe;
  }
  /* arrow + tag, centered in the gap between the two icon slots (x≈330, y=170) */
  .arrow{position:absolute;left:330px;top:170px;transform:translate(-50%,-50%);text-align:center;}
  .arrow .tag{display:inline-block;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:#a85a28;
    background:#f7efe6;border:1px solid #ead6c2;padding:3px 10px;border-radius:7px;white-space:nowrap;margin-bottom:9px;}
  /* dashed Applications drop-target around the alias slot (x=487, y=170) */
  .apps{position:absolute;left:487px;top:170px;transform:translate(-50%,-50%);
    width:132px;height:122px;border:1.5px dashed #ead6c2;border-radius:18px;background:rgba(168, 90, 40,.04);}
  /* Gatekeeper hint card (bottom) */
  .hint{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);
    display:flex;align-items:center;gap:11px;max-width:500px;
    padding:11px 16px;border-radius:11px;background:#fff;border:1px solid #e6e9ee;
    box-shadow:0 1px 2px rgba(28,40,60,.05),0 14px 30px -12px rgba(28,40,60,.22);}
  .hint .i{flex:none;width:22px;height:22px;border-radius:7px;display:grid;place-items:center;
    background:#f7efe6;color:#a85a28;font-family:ui-monospace,monospace;font-size:13px;font-weight:700;}
  .hint p{font-size:12px;color:#525d6b;line-height:1.5;}
  .hint b{color:#1c2229;} .hint b.steel{color:#a85a28;}
</style></head>
<body>
  <div class="apps"></div>
  <div class="arrow">
    <div class="tag">拖到这里安装</div>
    <svg width="92" height="20" viewBox="0 0 92 20" fill="none"><line x1="2" y1="10" x2="78" y2="10" stroke="#a85a28" stroke-width="3" stroke-linecap="round"/><path d="M76 3 L88 10 L76 17" fill="none" stroke="#a85a28" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="hint">
    <span class="i">i</span>
    <p>首次打开被 macOS 拦住？这是正常的——到 <b>系统设置 › 隐私与安全性</b>，点 <b class="steel">仍要打开</b> 即可。</p>
  </div>
</body></html>
